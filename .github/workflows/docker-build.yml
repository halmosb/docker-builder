name: Build and Push CPU Docker Images

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.get_versions.outputs.versions }}
      owner_lc: ${{ steps.vars.outputs.owner_lc }}
      repo_lc: ${{ steps.vars.outputs.repo_lc }}
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Normalize names
        id: vars
        run: |
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "repo_lc=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract Git tag
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          pip install pyyaml

      - name: Read Python versions from config
        id: get_versions
        run: |
          VERSIONS=$(python3 - <<EOF
import yaml
cfg = yaml.safe_load(open("config/versions.yaml"))
print(",".join(cfg["python_versions"]))
EOF
)
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ${{ fromJson(format('["{0}"]', join('","', split(needs.prepare.outputs.versions, ',')))) }}

    permissions:
      contents: read
      packages: write

    env:
      OWNER: ${{ needs.prepare.outputs.owner_lc }}
      REPO: ${{ needs.prepare.outputs.repo_lc }}
      TAG: ${{ needs.prepare.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Install generator deps
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Dockerfiles
        run: python scripts/generate.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: generated/Dockerfile.cpu.${{ matrix.python-version }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/python:${{ matrix.python-version }}-cpu-${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/python:${{ matrix.python-version }}-cpu
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/cache,mode=max

      - name: Tag and push "latest"
        if: matrix.python-version == '3.14'
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/python:latest \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/python:3.14-cpu-${{ env.TAG }}