name: Build and Push CPU Docker Images

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/python

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase repository owner
        id: vars
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install Python deps (generator)
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Dockerfiles
        run: python scripts/generate.py

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -f generated/Dockerfile.cpu.${{ matrix.python-version }} \
            -t $REGISTRY/$OWNER_LC/${{ github.event.repository.name }}/python:${{ matrix.python-version }}-cpu \
            .

      - name: Push image
        run: |
          docker push \
            $REGISTRY/$OWNER_LC/${{ github.event.repository.name }}/python:${{ matrix.python-version }}-cpu