name: Build and Push Docker Images

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.get_versions.outputs.versions }}
      owner_lc: ${{ steps.vars.outputs.owner_lc }}
      repo_lc: ${{ steps.vars.outputs.repo_lc }}
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "repo_lc=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - id: tag
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - run: |
          pip install pyyaml

      - id: get_versions
        run: |
          VERSIONS=$(python3 -c "import yaml,json;print(json.dumps(yaml.safe_load(open('config/versions.yaml'))['python_versions']))")
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT


  build:
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ${{ fromJson(needs.prepare.outputs.versions) }}
        device-type: [cpu, gpu]

    permissions:
      contents: read
      packages: write

    env:
      OWNER: ${{ needs.prepare.outputs.owner_lc }}
      REPO: ${{ needs.prepare.outputs.repo_lc }}
      TAG: ${{ needs.prepare.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - run: pip install -r requirements.txt
      - run: python scripts/generate.py

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # BUILD DIRECTLY INTO FINAL REPO (multi-tag = ONE manifest)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: generated/Dockerfile.${{ matrix.device-type }}.${{ matrix.python-version }}
          push: true

          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/python:${{ matrix.python-version }}-${{ matrix.device-type }}-${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/python:${{ matrix.python-version }}-${{ matrix.device-type }}
            ${{ matrix.python-version == '3.14' && matrix.device-type == 'cpu' && format('{0}/{1}/{2}/python:latest', env.REGISTRY, env.OWNER, env.REPO) || '' }}

          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-buildcache:${{ matrix.device-type }}-${{ matrix.python-version }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-buildcache:${{ matrix.device-type }}-${{ matrix.python-version }},mode=max

          provenance: false

  # SINGLE WRITER JOB → avoids race + cleans old tags
  finalize:
    needs: [build, prepare]
    runs-on: ubuntu-latest

    permissions:
      packages: write

    env:
      OWNER: ${{ needs.prepare.outputs.owner_lc }}
      REPO: ${{ needs.prepare.outputs.repo_lc }}
      TAG: ${{ needs.prepare.outputs.tag }}

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # DELETE old floating tags (clean registry)
      - name: Remove old stable tags
        run: |
          TAGS=$(gh api \
            /orgs/${OWNER}/packages/container/${REPO}%2Fpython/versions \
            --jq '.[].metadata.container.tags[]' | grep -E '^[0-9]+\.[0-9]+-(cpu|gpu)$' || true)

          for t in $TAGS; do
            if [[ "$t" != *"${TAG}"* ]]; then
              echo "Deleting old tag: $t"
              gh api \
                --method DELETE \
                /orgs/${OWNER}/packages/container/${REPO}%2Fpython/versions/$(gh api /orgs/${OWNER}/packages/container/${REPO}%2Fpython/versions --jq ".[] | select(.metadata.container.tags[]==\"$t\") | .id")
            fi
          done