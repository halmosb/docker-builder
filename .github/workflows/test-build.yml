name: Test Docker Build (CI)

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      python_version: ${{ steps.get_latest.outputs.python_version }}
      device_matrix: ${{ steps.set_matrix.outputs.device_matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          pip install pyyaml

      - name: Get latest Python version from config
        id: get_latest
        run: |
          VERSION=$(python3 -c "import yaml; cfg = yaml.safe_load(open('config/versions.yaml')); print(cfg['python_versions'][-1])")
          echo "python_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set device matrix
        id: set_matrix
        run: |
          if [[ "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" == gpu-feature* ]]; then
            echo 'device_matrix=["cpu","gpu"]' >> $GITHUB_OUTPUT
          else
            echo 'device_matrix=["cpu"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        device-type: ${{ fromJson(needs.prepare.outputs.device_matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install generator deps
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Dockerfiles
        run: python docker-builder/generate.py --no-root --no-latex

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: generated/Dockerfile.${{ needs.prepare.outputs.python_version }}.${{ matrix.device-type }}
          push: false
          load: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/cache
          cache-to: type=inline